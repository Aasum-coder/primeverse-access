name: Nightly Bug Triage Agent

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch bugs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PLATFORM: 'systm8'
        run: |
          echo "=== DEBUG: curl version ==="
          curl --version | head -1

          echo ""
          echo "=== DEBUG: Testing Supabase connection ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${SUPABASE_URL}/rest/v1/" -H "apikey: ${SUPABASE_SERVICE_KEY}" -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" || echo "000")
          echo "Supabase HTTP status: ${HTTP_CODE}"

          if [ "$HTTP_CODE" = "000" ]; then
            echo "ERROR: Cannot reach Supabase at all. Check SUPABASE_URL secret."
            echo "SUPABASE_URL length: ${#SUPABASE_URL}"
            echo "SUPABASE_SERVICE_KEY length: ${#SUPABASE_SERVICE_KEY}"
            echo "[]" > /tmp/bugs.json
            echo "[]" > /tmp/fails.json
            exit 0
          fi

          echo ""
          echo "=== Fetching bug_reports ==="
          BUGS=$(curl -s "${SUPABASE_URL}/rest/v1/bug_reports?status=eq.new&platform=eq.${PLATFORM}&order=created_at.desc&limit=20" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" || echo "[]")
          echo "BUGS response (first 300 chars): $(echo "$BUGS" | head -c 300)"
          echo "$BUGS" > /tmp/bugs.json

          echo ""
          echo "=== Fetching test_results ==="
          FAILS=$(curl -s "${SUPABASE_URL}/rest/v1/test_results?status=eq.fail&order=created_at.desc&limit=50" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" || echo "[]")
          echo "FAILS response (first 300 chars): $(echo "$FAILS" | head -c 300)"
          echo "$FAILS" > /tmp/fails.json

          echo ""
          echo "=== File sizes ==="
          ls -la /tmp/bugs.json /tmp/fails.json

      - name: Triage and create issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const { execSync } = require('child_process');

          let bugs = [];
          let fails = [];

          try {
            const raw = fs.readFileSync('/tmp/bugs.json', 'utf8').trim();
            bugs = JSON.parse(raw || '[]');
            if (!Array.isArray(bugs)) bugs = [];
          } catch (e) {
            console.log('Could not parse bugs.json:', e.message);
            bugs = [];
          }

          try {
            const raw = fs.readFileSync('/tmp/fails.json', 'utf8').trim();
            fails = JSON.parse(raw || '[]');
            if (!Array.isArray(fails)) fails = [];
          } catch (e) {
            console.log('Could not parse fails.json:', e.message);
            fails = [];
          }

          console.log(`Parsed ${bugs.length} bugs and ${fails.length} test failures`);

          const severityEmoji = { critical: '\u{1F534}', major: '\u{1F7E0}', minor: '\u{1F7E1}', cosmetic: '\u{1F7E3}' };
          const severityOrder = { critical: 0, major: 1, minor: 2, cosmetic: 3 };

          function guessFile(text) {
            const t = text.toLowerCase();
            if (t.includes('landing') || t.includes('slug')) return 'app/[slug]/page.tsx';
            if (t.includes('email') || t.includes('mail')) return 'app/api/ (email routes)';
            if (t.includes('login') || t.includes('signup')) return 'app/login/page.tsx';
            if (t.includes('bio') || t.includes('groq')) return 'app/api/generate-bio/route.ts';
            if (t.includes('share')) return 'app/page.tsx (share section)';
            if (t.includes('language') || t.includes('translat')) return 'translations in page files';
            return 'app/page.tsx';
          }

          function createPrompt(title, desc, severity, file) {
            return [
              'BUG FIX: ' + title,
              'SEVERITY: ' + severity,
              'DESCRIPTION: ' + desc,
              'LIKELY FILE: ' + file,
              '',
              'FIX: Investigate and fix this bug. After fixing, verify:',
              '- The fix does not break existing functionality',
              '- All 9 languages still work (EN, NO, SV, ES, RU, AR, PH, PT, TH)',
              '- The dark/gold SYSTM8 theme is maintained',
              '- Mobile responsiveness is preserved',
              '- Brand names are never translated (SYSTM8, PrimeVerse, 1Move, PuPrime)'
            ].join('\n');
          }

          let items = [];

          bugs.forEach(bug => {
            items.push({
              id: bug.id || 'unknown',
              title: bug.title || 'Untitled bug',
              desc: bug.description || '',
              severity: bug.severity || 'major',
              reporter: bug.reporter_email || 'Anonymous',
              screenshot: bug.screenshot_url,
              steps: bug.steps_to_reproduce,
              prompt: bug.agent_prompt,
              source: 'bug_report',
              date: bug.created_at
            });
          });

          const failGroups = {};
          fails.forEach(f => {
            const key = (f.section || '') + '::' + (f.test_item || '');
            if (!failGroups[key]) failGroups[key] = { count: 0, comments: [], item: f };
            failGroups[key].count++;
            if (f.comment) failGroups[key].comments.push(f.comment);
          });

          Object.values(failGroups).forEach(g => {
            items.push({
              id: 'test-' + (g.item.test_item || 'unknown').substring(0, 20),
              title: 'Test failed: ' + (g.item.test_item || 'unknown'),
              desc: g.count + ' tester(s) reported this failure.' +
                (g.comments.length ? ' Comments: ' + g.comments.join('; ') : ''),
              severity: g.count >= 3 ? 'critical' : g.count >= 2 ? 'major' : 'minor',
              reporter: g.count + ' tester(s)',
              source: 'test_result',
              date: g.item.created_at
            });
          });

          items.sort((a, b) => (severityOrder[a.severity] || 1) - (severityOrder[b.severity] || 1));

          if (items.length === 0) {
            console.log('No new bugs or failures. All clear!');
            process.exit(0);
          }

          console.log('Found ' + items.length + ' items to process');

          items.forEach(item => {
            const emoji = severityEmoji[item.severity] || '\u{1F7E0}';
            const file = guessFile(item.title + ' ' + item.desc);
            const prompt = item.prompt || createPrompt(item.title, item.desc, item.severity, file);

            const issueTitle = emoji + ' [' + item.severity.toUpperCase() + '] ' + item.title;

            const bodyParts = [
              '## ' + emoji + ' Auto-triaged Bug\n',
              '**Severity:** ' + item.severity.toUpperCase(),
              '**Source:** ' + (item.source === 'bug_report' ? 'Bug Report' : 'Beta Test Failure'),
              '**Reported by:** ' + item.reporter,
              '**Date:** ' + (item.date || new Date().toISOString()),
            ];
            if (item.screenshot) bodyParts.push('**Screenshot:** ![img](' + item.screenshot + ')');
            if (item.steps) bodyParts.push('\n### Steps to reproduce\n' + item.steps);
            bodyParts.push('\n### Description\n' + item.desc);
            bodyParts.push('\n---\n');
            bodyParts.push('### Claude Code prompt\n');
            bodyParts.push('```\n' + prompt + '\n```');
            bodyParts.push('\n---');
            bodyParts.push('*Auto-generated by SYSTM8 Nightly Triage Agent*');
            bodyParts.push('*Bug ID: ' + item.id + '*');

            const body = bodyParts.join('\n');
            const labels = 'bug-' + item.severity + ',auto-triage,agent-ready';

            try {
              const searchTitle = item.title.substring(0, 50).replace(/['"]/g, '');
              const existing = execSync(
                'gh issue list --search "' + searchTitle + '" --state open --limit 1 --json number --jq ".[0].number // empty"',
                { encoding: 'utf8', timeout: 10000 }
              ).trim();

              if (existing) {
                console.log('Skipped (exists as #' + existing + '): ' + item.title);
                return;
              }

              const tmpFile = '/tmp/issue_body_' + Math.random().toString(36).substring(7) + '.md';
              fs.writeFileSync(tmpFile, body);

              execSync(
                'gh issue create --title "' + issueTitle.replace(/"/g, '\\"') + '" --body-file ' + tmpFile + ' --label "' + labels + '"',
                { encoding: 'utf8', timeout: 15000 }
              );
              console.log('Created: ' + issueTitle);
            } catch (e) {
              console.log('Failed to create issue: ' + item.title + ' - ' + e.message);
            }
          });

          console.log('Nightly triage complete!');
          SCRIPT

      - name: Update bug statuses
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PLATFORM: 'systm8'
        run: |
          curl -s -X PATCH \
            "${SUPABASE_URL}/rest/v1/bug_reports?status=eq.new&platform=eq.${PLATFORM}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "triaging"}' || echo "Status update skipped"
          echo "Bug statuses updated to triaging"

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "bug-critical" --color "FF0000" --description "Critical bug" --force 2>/dev/null || true
          gh label create "bug-major" --color "FF8C00" --description "Major bug" --force 2>/dev/null || true
          gh label create "bug-minor" --color "FFD700" --description "Minor bug" --force 2>/dev/null || true
          gh label create "bug-cosmetic" --color "9B59B6" --description "Cosmetic bug" --force 2>/dev/null || true
          gh label create "auto-triage" --color "3498DB" --description "Auto-generated by triage agent" --force 2>/dev/null || true
          gh label create "agent-ready" --color "2ECC71" --description "Claude Code prompt ready" --force 2>/dev/null || true
          echo "Labels ensured"
