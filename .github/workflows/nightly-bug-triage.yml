name: Nightly Bug Triage Agent

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch bugs and create issues
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRIAGE_SECRET: ${{ secrets.TRIAGE_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLATFORM: 'systm8'
        run: |
          echo "🔍 Fetching new bugs from Supabase..."
          
          BUGS=$(curl -s \
            "${SUPABASE_URL}/rest/v1/bug_reports?status=eq.new&platform=eq.${PLATFORM}&order=created_at.desc&limit=20" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          
          FAILS=$(curl -s \
            "${SUPABASE_URL}/rest/v1/test_results?status=eq.fail&order=created_at.desc&limit=50" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          
          node << 'SCRIPT'
          const { execSync } = require('child_process');
          
          const bugs = JSON.parse(process.env.BUGS_JSON || '[]');
          const fails = JSON.parse(process.env.FAILS_JSON || '[]');
          
          const severityEmoji = { critical: '🔴', major: '🟠', minor: '🟡', cosmetic: '🟣' };
          const severityOrder = { critical: 0, major: 1, minor: 2, cosmetic: 3 };
          
          function guessFile(text) {
            const t = text.toLowerCase();
            if (t.includes('landing') || t.includes('slug')) return 'app/[slug]/page.tsx';
            if (t.includes('email') || t.includes('mail')) return 'app/api/ (email routes)';
            if (t.includes('login') || t.includes('signup')) return 'app/login/page.tsx';
            if (t.includes('bio') || t.includes('groq')) return 'app/api/generate-bio/route.ts';
            if (t.includes('share')) return 'app/page.tsx (share section)';
            if (t.includes('language') || t.includes('translat')) return 'translations in page files';
            return 'app/page.tsx';
          }
          
          function createPrompt(title, desc, severity, file) {
            return `BUG FIX: ${title}
          SEVERITY: ${severity}
          DESCRIPTION: ${desc}
          LIKELY FILE: ${file}
          
          FIX: Investigate and fix this bug. After fixing, verify:
          - The fix does not break existing functionality
          - All 9 languages still work (EN, NO, SV, ES, RU, AR, PH, PT, TH)
          - The dark/gold SYSTM8 theme is maintained
          - Mobile responsiveness is preserved
          - Brand names are never translated (SYSTM8, PrimeVerse, 1Move, PuPrime)`;
          }
          
          let items = [];
          
          bugs.forEach(bug => {
            items.push({
              id: bug.id,
              title: bug.title || 'Untitled bug',
              desc: bug.description || '',
              severity: bug.severity || 'major',
              reporter: bug.reporter_email || 'Anonymous',
              screenshot: bug.screenshot_url,
              steps: bug.steps_to_reproduce,
              prompt: bug.agent_prompt,
              source: 'bug_report',
              date: bug.created_at
            });
          });
          
          const failGroups = {};
          fails.forEach(f => {
            const key = f.section + '::' + f.test_item;
            if (!failGroups[key]) failGroups[key] = { count: 0, comments: [], item: f };
            failGroups[key].count++;
            if (f.comment) failGroups[key].comments.push(f.comment);
          });
          
          Object.values(failGroups).forEach(g => {
            items.push({
              id: 'test-' + g.item.section + '-' + g.item.test_item.substring(0,20),
              title: 'Test failed: ' + g.item.test_item,
              desc: g.count + ' tester(s) reported this failure.' + 
                (g.comments.length ? ' Comments: ' + g.comments.join('; ') : ''),
              severity: g.count >= 3 ? 'critical' : g.count >= 2 ? 'major' : 'minor',
              reporter: g.count + ' tester(s)',
              source: 'test_result',
              date: g.item.created_at
            });
          });
          
          items.sort((a, b) => (severityOrder[a.severity] || 1) - (severityOrder[b.severity] || 1));
          
          if (items.length === 0) {
            console.log('✅ No new bugs or failures. All clear!');
            process.exit(0);
          }
          
          console.log(`📋 Found ${items.length} items to process`);
          
          items.forEach(item => {
            const emoji = severityEmoji[item.severity] || '🟠';
            const file = guessFile(item.title + ' ' + item.desc);
            const prompt = item.prompt || createPrompt(item.title, item.desc, item.severity, file);
            
            const issueTitle = `${emoji} [${item.severity.toUpperCase()}] ${item.title}`;
            
            const body = [
              `## ${emoji} Auto-triaged Bug\n`,
              `**Severity:** ${item.severity.toUpperCase()}`,
              `**Source:** ${item.source === 'bug_report' ? 'Bug Report' : 'Beta Test Failure'}`,
              `**Reported by:** ${item.reporter}`,
              `**Date:** ${item.date || new Date().toISOString()}`,
              item.screenshot ? `**Screenshot:** ![img](${item.screenshot})` : '',
              item.steps ? `\n### Steps to reproduce\n${item.steps}` : '',
              `\n### Description\n${item.desc}`,
              `\n---\n`,
              `### 🤖 Claude Code prompt — copy and paste this\n`,
              '```',
              prompt,
              '```',
              `\n---`,
              `*Auto-generated by SYSTM8 Nightly Triage Agent*`,
              `*Bug ID: ${item.id}*`
            ].filter(Boolean).join('\n');
            
            const labels = `bug-${item.severity},auto-triage,agent-ready`;
            
            try {
              const existing = execSync(
                `gh issue list --search "${item.title.substring(0, 50)}" --state open --limit 1 --json number --jq '.[0].number // empty'`,
                { encoding: 'utf8', timeout: 10000 }
              ).trim();
              
              if (existing) {
                console.log(`⏭️  Skipped (exists as #${existing}): ${item.title}`);
                return;
              }
              
              execSync(
                `gh issue create --title "${issueTitle.replace(/"/g, '\\"')}" --body "${body.replace(/"/g, '\\"').replace(/\n/g, '\\n')}" --label "${labels}"`,
                { encoding: 'utf8', timeout: 15000 }
              );
              console.log(`✅ Created: ${issueTitle}`);
            } catch (e) {
              console.log(`⚠️  Failed to create issue: ${item.title} — ${e.message}`);
            }
          });
          
          console.log('🏁 Nightly triage complete!');
          SCRIPT
      - name: Update bug statuses
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PLATFORM: 'systm8'
        run: |
          curl -s -X PATCH \
            "${SUPABASE_URL}/rest/v1/bug_reports?status=eq.new&platform=eq.${PLATFORM}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"status": "triaging"}' || echo "Status update skipped"
          echo "📊 Bug statuses updated to 'triaging'"
